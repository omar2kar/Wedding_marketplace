<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار عرض البائعين</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f6d8d8 0%, #5a9be7 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
        }
        .vendor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .vendor-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }
        .vendor-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
        }
        .vendor-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #FFD700;
        }
        .vendor-owner {
            font-size: 16px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        .vendor-stats {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            font-size: 14px;
        }
        .rating {
            color: #FFD700;
        }
        .price-range {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.5);
            border-radius: 10px;
            padding: 20px;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎊 اختبار عرض البائعين</h1>
            <p>اختبار مباشر للـ API</p>
        </div>
        
        <div id="loading" class="loading">
            <div>⏳ جاري تحميل البائعين...</div>
        </div>
        
        <div id="error" class="error" style="display: none;">
            <h3>❌ خطأ في تحميل البيانات</h3>
            <p id="error-message"></p>
        </div>
        
        <div id="results" class="vendor-grid"></div>
    </div>

    <script>
        console.log('🚀 بدء اختبار البائعين...');
        
        async function testVendors() {
            try {
                console.log('📡 استدعاء API...');
                const response = await fetch('http://localhost:5000/api/services');
                console.log('📊 حالة الاستجابة:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const vendors = await response.json();
                console.log('✅ تم استلام البيانات:', vendors);
                console.log('📈 عدد البائعين:', vendors.length);
                
                document.getElementById('loading').style.display = 'none';
                
                if (vendors.length === 0) {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error-message').textContent = 'لا توجد بائعين للعرض';
                    return;
                }
                
                const resultsDiv = document.getElementById('results');
                resultsDiv.innerHTML = vendors.map(vendor => `
                    <div class="vendor-card">
                        <div class="vendor-name">${vendor.businessName || 'بائع غير محدد'}</div>
                        <div class="vendor-owner">المالك: ${vendor.ownerName || 'غير محدد'}</div>
                        <div class="vendor-stats">
                            <span class="rating">⭐ ${vendor.rating || 0} (${vendor.reviewCount || 0} تقييم)</span>
                            <span>${vendor.serviceCount || 0} خدمة</span>
                        </div>
                        <div class="vendor-stats">
                            <span>الفئة: ${vendor.vendorCategory || 'غير محدد'}</span>
                            <span class="price-range">€${vendor.minPrice || 0} - €${vendor.maxPrice || 0}</span>
                        </div>
                        <div style="margin-top: 10px; font-size: 12px; opacity: 0.8;">
                            ID: ${vendor.id} | البريد: ${vendor.email || 'غير محدد'}
                        </div>
                    </div>
                `).join('');
                
                console.log('✅ تم عرض البائعين بنجاح!');
                
            } catch (error) {
                console.error('❌ خطأ في تحميل البائعين:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error-message').textContent = error.message;
            }
        }
        
        // بدء الاختبار عند تحميل الصفحة
        testVendors();
    </script>
</body>
</html>
